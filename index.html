<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DM Studios</title>
	<meta name="description" content="DM Studios games, press kits, socials, and contact.">
	<style>
		:root {
			--background-color: #000000;
			--surface-color: #111111;
			--surface-hover-color: #1b1b1b;
			--text-color: #ffffff;
			--muted-text-color: #b3b3b3;
			--border-color: #262626;
			--button-color: #ffffff;
			--button-text-color: #000000;
		}

		* {
			box-sizing: border-box;
		}

		html {
			scroll-behavior: smooth;
		}

		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background-color: var(--background-color);
			color: var(--text-color);
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		img {
			display: block;
			max-width: 100%;
		}

		.page-shell {
			width: 100%;
			max-width: 1040px;
			margin: 0 auto;
			padding: 48px 20px 32px 20px;
		}

		.site-header {
			display: flex;
			justify-content: center;
			align-items: center;
			padding-bottom: 40px;
		}

		.logo-image {
			max-width: 280px;
			width: 100%;
			height: auto;
		}

		.games-section {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 28px;
		}

		.game-card {
			background-color: var(--surface-color);
			border: 1px solid var(--border-color);
			border-radius: 18px;
			overflow: hidden;
		}

		.game-image {
			width: 100%;
			aspect-ratio: 16 / 9;
			object-fit: cover;
			background-color: #090909;
		}

		.game-content {
			padding: 20px;
		}

		.game-title {
			margin: 0 0 14px 0;
			font-size: 24px;
			line-height: 1.2;
		}

		.game-actions {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}

		.action-button {
			display: inline-flex;
			justify-content: center;
			align-items: center;
			min-height: 46px;
			padding: 0 18px;
			border-radius: 999px;
			background-color: var(--button-color);
			color: var(--button-text-color);
			font-size: 15px;
			font-weight: 700;
			letter-spacing: 0.02em;
			transition: transform 0.18s ease, opacity 0.18s ease;
		}

		.action-button:hover {
			transform: translateY(-1px);
			opacity: 0.9;
		}

		.site-footer {
			padding-top: 44px;
		}

		.footer-divider {
			width: 100%;
			height: 1px;
			background-color: var(--border-color);
			margin-bottom: 24px;
		}

		.footer-actions {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 14px;
			flex-wrap: wrap;
		}

		.icon-button {
			display: inline-flex;
			justify-content: center;
			align-items: center;
			width: 46px;
			height: 46px;
			border-radius: 50%;
			border: 1px solid var(--border-color);
			background-color: var(--surface-color);
			transition: background-color 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
		}

		.icon-button:hover {
			background-color: var(--surface-hover-color);
			border-color: #3a3a3a;
			transform: translateY(-1px);
		}

		.icon-button svg {
			width: 20px;
			height: 20px;
			fill: currentColor;
		}

		.contact-button {
			display: inline-flex;
			justify-content: center;
			align-items: center;
			min-height: 46px;
			padding: 0 18px;
			border-radius: 999px;
			border: 1px solid var(--border-color);
			background-color: var(--surface-color);
			font-size: 15px;
			font-weight: 700;
			transition: background-color 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
		}

		.contact-button:hover {
			background-color: var(--surface-hover-color);
			border-color: #3a3a3a;
			transform: translateY(-1px);
		}

		.footer-note {
			margin-top: 20px;
			text-align: center;
			font-size: 13px;
			color: var(--muted-text-color);
		}

		@media (max-width: 768px) {
			.page-shell {
				padding-top: 32px;
			}

			.games-section {
				grid-template-columns: 1fr;
			}

			.logo-image {
				max-width: 220px;
			}
		}
	</style>
</head>
